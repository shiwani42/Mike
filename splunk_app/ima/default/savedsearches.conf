[ima_simulate_alerts]
description = Generates one synthetic SOC alert every 5 minutes into index=main sourcetype=ima:alert. Used to drive the live `ima alerts watch` and `| imabuild` loop without needing a real correlation search to fire. Disable in production deployments.
search = | makeresults \
| eval _time = now() \
| eval scenarios = "failed_auth_burst,unusual_login,port_scan,dlp_exfil_attempt,malware_signature" \
| eval s = split(scenarios, ",") \
| eval event_type = mvindex(s, random() % 5) \
| eval assets = "acct-prod-01,laptop-eng-44,laptop-exec-ciso,subnet-10.200.0.0_24,laptop-eng-12,laptop-sales-08,laptop-finance-22" \
| eval a = split(assets, ",") \
| eval asset = mvindex(a, random() % 7) \
| eval src = "10." . tostring(random() % 256) . "." . tostring(random() % 256) . "." . tostring(random() % 256) \
| eval alert_id = "NOTABLE-AUTO-" . tostring(random() % 999999) \
| eval severity = case( \
    event_type=="malware_signature", "high", \
    event_type=="dlp_exfil_attempt", "high", \
    event_type=="unusual_login", "medium", \
    true(), "low") \
| table _time, alert_id, event_type, asset, src, severity \
| collect index=main sourcetype="ima:alert" marker="ima_synthetic=true"
enableSched = 1
disabled = 0
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_visible = true
