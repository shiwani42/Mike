[ima_annotations]
external_type = kvstore
collection = ima_annotations
fields_list = _key, alert_id, event_type, analyst, disposition, reason, source_ip, asset, created_at

[ima_knowledge]
external_type = kvstore
collection = ima_knowledge
fields_list = _key, topic, summary, evidence_count, confidence, tags, updated_at

[ima_assets]
external_type = kvstore
collection = ima_assets
fields_list = _key, asset, owner, notes, behavioral_exceptions, updated_at
